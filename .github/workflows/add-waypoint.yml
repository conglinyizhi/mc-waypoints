name: 处理坐标提交

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  # ============================================================
  # 阶段 1：校验 + 分流
  # ============================================================
  validate:
    if: >
      github.event.action == 'labeled' &&
      github.event.label.name == 'ci:add_waypoint' &&
      !contains(github.event.issue.labels.*.name, 'ci:pending') &&
      !contains(github.event.issue.labels.*.name, 'ci:invalid') &&
      !contains(github.event.issue.labels.*.name, 'ci:processed')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 解析并校验
        id: parse
        env:
          BODY: ${{ github.event.issue.body }}
          AUTHOR_ASSOC: ${{ github.event.issue.author_association }}
        run: |
          RESULT=$(node .github/scripts/ci-waypoint.mjs parse)
          echo "$RESULT" > /tmp/parse-result.json

          echo "valid=$(echo "$RESULT" | jq -r '.valid')" >> $GITHUB_OUTPUT
          echo "name=$(echo "$RESULT" | jq -r '.name')" >> $GITHUB_OUTPUT
          echo "x=$(echo "$RESULT" | jq -r '.x')" >> $GITHUB_OUTPUT
          echo "y=$(echo "$RESULT" | jq -r '.y')" >> $GITHUB_OUTPUT
          echo "z=$(echo "$RESULT" | jq -r '.z')" >> $GITHUB_OUTPUT
          echo "dimension=$(echo "$RESULT" | jq -r '.dimension')" >> $GITHUB_OUTPUT
          echo "note=$(echo "$RESULT" | jq -r '.note')" >> $GITHUB_OUTPUT
          echo "debug=$(echo "$RESULT" | jq -r '.debug')" >> $GITHUB_OUTPUT
          echo "is_maintainer=$(echo "$RESULT" | jq -r '.isMaintainer')" >> $GITHUB_OUTPUT
          echo "errors=$(echo "$RESULT" | jq -r '.errors | join("\n")')" >> $GITHUB_OUTPUT

      # ---- 校验失败 ----
      - name: 校验失败
        if: steps.parse.outputs.valid == 'false'
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "❌ **校验失败，请修正后重新提交：**

          ${{ steps.parse.outputs.errors }}"
          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "ci:invalid"

      # ---- 维护者 + 无 try → 直接写入 ----
      - name: 直接写入
        if: >
          steps.parse.outputs.valid == 'true' &&
          steps.parse.outputs.is_maintainer == 'true' &&
          steps.parse.outputs.debug == 'false'
        run: |
          CONTRIBUTOR="${{ github.event.issue.user.login }}"
          ID="ci-$(date +%s)-${{ github.event.issue.number }}"
          CREATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          RECORD=$(jq -n \
            --arg id "$ID" \
            --arg name "${{ steps.parse.outputs.name }}" \
            --argjson x "${{ steps.parse.outputs.x }}" \
            --argjson y "${{ steps.parse.outputs.y }}" \
            --argjson z "${{ steps.parse.outputs.z }}" \
            --arg dimension "${{ steps.parse.outputs.dimension }}" \
            --arg category "" \
            --arg note "${{ steps.parse.outputs.note }}" \
            --arg contributor "$CONTRIBUTOR" \
            --arg createdAt "$CREATED_AT" \
            '{id:$id,name:$name,x:$x,y:$y,z:$z,dimension:$dimension,category:$category,note:$note,contributor:$contributor,createdAt:$createdAt}' | jq -c '.')

          node .github/scripts/ci-waypoint.mjs write public/data/waypoints.jsonl "$RECORD"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/data/waypoints.jsonl
          git commit -m "添加坐标: ${{ steps.parse.outputs.name }} (${{ steps.parse.outputs.x }}, ${{ steps.parse.outputs.y }}, ${{ steps.parse.outputs.z }}) [${{ steps.parse.outputs.dimension }}]

          Closes #${{ github.event.issue.number }}"
          git push

      - name: 直接写入完成
        if: >
          steps.parse.outputs.valid == 'true' &&
          steps.parse.outputs.is_maintainer == 'true' &&
          steps.parse.outputs.debug == 'false'
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "✨ **维护者提交 — 坐标已直接写入**

          | 字段 | 值 |
          |------|-----|
          | 名称 | ${{ steps.parse.outputs.name }} |
          | 坐标 | ${{ steps.parse.outputs.x }} ${{ steps.parse.outputs.y }} ${{ steps.parse.outputs.z }} |
          | 维度 | ${{ steps.parse.outputs.dimension }} |
          | 备注 | ${{ steps.parse.outputs.note }} |
          | 提交者 | @${{ github.event.issue.user.login }} |"

          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}"
          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "ci:processed"

      # ---- pending 流程（普通用户 / ci:try）----
      - name: 深度查重
        if: >
          steps.parse.outputs.valid == 'true' &&
          ( steps.parse.outputs.is_maintainer == 'false' || steps.parse.outputs.debug == 'true' )
        id: deepcheck
        env:
          NAME: ${{ steps.parse.outputs.name }}
          X: ${{ steps.parse.outputs.x }}
          Z: ${{ steps.parse.outputs.z }}
          DIMENSION: ${{ steps.parse.outputs.dimension }}
        run: |
          RESULT=$(node .github/scripts/ci-waypoint.mjs deepcheck public/data/waypoints.jsonl)
          WARNINGS=$(echo "$RESULT" | jq -r '.warnings')
          COUNT=$(echo "$RESULT" | jq -r '.warnings | length')

          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt 0 ]; then
            echo "WARN_MD=$(echo "$RESULT" | jq -r '[.warnings[].msg] | join("\n\n")')" >> $GITHUB_OUTPUT
          fi

      - name: pending 评论
        if: >
          steps.parse.outputs.valid == 'true' &&
          ( steps.parse.outputs.is_maintainer == 'false' || steps.parse.outputs.debug == 'true' )
        run: |
          LABELS="ci:pending"
          MODE=""
          if [ "${{ steps.parse.outputs.debug }}" = "true" ]; then
            LABELS="$LABELS,ci:try"
            MODE="🔬 **ci:try 调试模式**\n\n"
          fi

          WARN_SECTION=""
          if [ "${{ steps.deepcheck.outputs.count }}" != "0" ]; then
            WARN_SECTION="### ⚠️ 深度查重发现 ${{ steps.deepcheck.outputs.count }} 个疑点

          ${{ steps.deepcheck.outputs.WARN_MD }}

          ---
          "
          fi

          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "${MODE}✅ **校验通过，等待审核**

          | 字段 | 值 |
          |------|-----|
          | 名称 | ${{ steps.parse.outputs.name }} |
          | 坐标 | ${{ steps.parse.outputs.x }} ${{ steps.parse.outputs.y }} ${{ steps.parse.outputs.z }} |
          | 维度 | ${{ steps.parse.outputs.dimension }} |
          | 备注 | ${{ steps.parse.outputs.note }} |
          | 提交者 | @${{ github.event.issue.user.login }} |

          ${WARN_SECTION}> 请维护者回复 \`通过\` / \`ok\` 确认写入，或 \`不通过\` / \`fail\` 拒绝。"

          if [ "${{ steps.deepcheck.outputs.count }}" = "0" ]; then
            gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "✅ 深度查重未发现疑点"
          fi

          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "$LABELS"

  # ============================================================
  # 阶段 2：审核
  # ============================================================
  review:
    if: >
      github.event.action == 'created' &&
      contains(github.event.issue.labels.*.name, 'ci:pending') &&
      (
        contains(github.event.comment.author_association, 'OWNER') ||
        contains(github.event.comment.author_association, 'COLLABORATOR') ||
        contains(github.event.comment.author_association, 'MEMBER')
      )
    runs-on: ubuntu-latest

    steps:
      - name: 判断审核结果
        id: review
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          LOWER=$(echo "$COMMENT" | tr '[:upper:]' '[:lower:]')
          if echo "$LOWER" | grep -qE '通过|ok'; then
            echo "result=approved" >> $GITHUB_OUTPUT
          elif echo "$LOWER" | grep -qE '不通过|fail|no|拒绝|reject'; then
            echo "result=rejected" >> $GITHUB_OUTPUT
          else
            echo "result=ignored" >> $GITHUB_OUTPUT
          fi

      - name: 审核拒绝
        if: steps.review.outputs.result == 'rejected'
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "🚫 **审核未通过**

          审核人: @${{ github.event.comment.user.login }}

          请根据反馈修正后重新提交 Issue。"
          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "ci:rejected"

      - uses: actions/checkout@v4
        if: steps.review.outputs.result == 'approved'

      - name: 审核通过 — 解析并写入
        if: steps.review.outputs.result == 'approved'
        id: write
        env:
          BODY: ${{ github.event.issue.body }}
          AUTHOR_ASSOC: ${{ github.event.issue.author_association }}
        run: |
          RESULT=$(node .github/scripts/ci-waypoint.mjs parse)
          echo "name=$(echo "$RESULT" | jq -r '.name')" >> $GITHUB_OUTPUT
          echo "x=$(echo "$RESULT" | jq -r '.x')" >> $GITHUB_OUTPUT
          echo "y=$(echo "$RESULT" | jq -r '.y')" >> $GITHUB_OUTPUT
          echo "z=$(echo "$RESULT" | jq -r '.z')" >> $GITHUB_OUTPUT
          echo "dimension=$(echo "$RESULT" | jq -r '.dimension')" >> $GITHUB_OUTPUT
          echo "note=$(echo "$RESULT" | jq -r '.note')" >> $GITHUB_OUTPUT

          CONTRIBUTOR="${{ github.event.issue.user.login }}"
          ID="ci-$(date +%s)-${{ github.event.issue.number }}"
          CREATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          RECORD=$(jq -n \
            --arg id "$ID" \
            --arg name "$(echo "$RESULT" | jq -r '.name')" \
            --argjson x "$(echo "$RESULT" | jq -r '.x')" \
            --argjson y "$(echo "$RESULT" | jq -r '.y')" \
            --argjson z "$(echo "$RESULT" | jq -r '.z')" \
            --arg dimension "$(echo "$RESULT" | jq -r '.dimension')" \
            --arg category "" \
            --arg note "$(echo "$RESULT" | jq -r '.note')" \
            --arg contributor "$CONTRIBUTOR" \
            --arg createdAt "$CREATED_AT" \
            '{id:$id,name:$name,x:$x,y:$y,z:$z,dimension:$dimension,category:$category,note:$note,contributor:$contributor,createdAt:$createdAt}' | jq -c '.')

          node .github/scripts/ci-waypoint.mjs write public/data/waypoints.jsonl "$RECORD"

      - name: 提交推送
        if: steps.review.outputs.result == 'approved'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/data/waypoints.jsonl
          git commit -m "添加坐标: ${{ steps.write.outputs.name }} (${{ steps.write.outputs.x }}, ${{ steps.write.outputs.y }}, ${{ steps.write.outputs.z }}) [${{ steps.write.outputs.dimension }}]

          Closes #${{ github.event.issue.number }}"
          git push

      - name: 评论并关闭
        if: steps.review.outputs.result == 'approved'
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "✨ **审核通过，坐标已写入主分支**

          | 字段 | 值 |
          |------|-----|
          | 名称 | ${{ steps.write.outputs.name }} |
          | 坐标 | ${{ steps.write.outputs.x }} ${{ steps.write.outputs.y }} ${{ steps.write.outputs.z }} |
          | 维度 | ${{ steps.write.outputs.dimension }} |
          | 备注 | ${{ steps.write.outputs.note }} |

          审核人: @${{ github.event.comment.user.login }}"

          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}"
          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "ci:approved,ci:processed"
