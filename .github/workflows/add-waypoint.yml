name: 处理坐标提交

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]

jobs:
  validate:
    if: >
      vars.CI_DISABLED != 'true' &&
      (
        ( github.event.action == 'labeled' && github.event.label.name == 'ci:add_waypoint' ) ||
        ( (github.event.action == 'opened' || github.event.action == 'reopened') && contains(github.event.issue.labels.*.name, 'ci:add_waypoint') )
      ) &&
      !contains(github.event.issue.labels.*.name, 'ci:pending') &&
      !contains(github.event.issue.labels.*.name, 'ci:invalid') &&
      !contains(github.event.issue.labels.*.name, 'ci:processed')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: 触发确认
        run: |
          gh issue comment ${{ github.event.issue.number }} -R ${{ github.repository }} -b "✅ CI 触发: ${{ github.event.action }}"
