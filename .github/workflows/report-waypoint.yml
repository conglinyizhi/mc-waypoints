name: 处理坐标报错

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]

concurrency:
  group: waypoint-report-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  validate:
    if: >
      vars.CI_DISABLED != 'true' &&
      (
        ( github.event.action == 'labeled' && github.event.label.name == 'ci:report_waypoint' ) ||
        ( (github.event.action == 'opened' || github.event.action == 'reopened') && contains(github.event.issue.labels.*.name, 'ci:report_waypoint') )
      ) &&
      !contains(github.event.issue.labels.*.name, 'ci:pending') &&
      !contains(github.event.issue.labels.*.name, 'ci:invalid') &&
      !contains(github.event.issue.labels.*.name, 'ci:processed') &&
      !contains(github.event.issue.labels.*.name, 'ci:approved') &&
      !contains(github.event.issue.labels.*.name, 'ci:rejected')
    permissions:
      contents: write
      issues: write
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: 幂等门闩
        id: gate
        run: |
          set -euo pipefail
          LABELS=$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name] | join(",")')
          echo "live_labels=$LABELS"
          if echo ",$LABELS," | grep -qE ',(ci:pending|ci:invalid|ci:processed|ci:approved|ci:rejected),'; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "已由其他 run 处理（标签: $LABELS），跳过"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.proceed == 'true'

      - name: 获取数据文件
        if: steps.gate.outputs.proceed == 'true'
        run: |
          git fetch origin data
          git show origin/data:public/data/waypoints.jsonl > public/data/waypoints.jsonl 2>/dev/null || touch public/data/waypoints.jsonl

      - name: 解析并校验
        if: steps.gate.outputs.proceed == 'true'
        id: parse
        env:
          BODY: ${{ github.event.issue.body }}
          AUTHOR_ASSOC: ${{ github.event.issue.author_association }}
        run: |
          RESULT=$(node .github/scripts/ci-waypoint.mjs parse-report)
          echo "$RESULT" > /tmp/parse-report.json
          echo "valid=$(echo "$RESULT" | jq -r '.valid')" >> $GITHUB_OUTPUT
          echo "action=$(echo "$RESULT" | jq -r '.action')" >> $GITHUB_OUTPUT
          echo "waypoint_id=$(echo "$RESULT" | jq -r '.waypointId')" >> $GITHUB_OUTPUT
          echo "debug=$(echo "$RESULT" | jq -r '.debug')" >> $GITHUB_OUTPUT
          echo "is_maintainer=$(echo "$RESULT" | jq -r '.isMaintainer')" >> $GITHUB_OUTPUT
          echo "errors=$(echo "$RESULT" | jq -c '.errors')" >> $GITHUB_OUTPUT
          echo "patch=$(echo "$RESULT" | jq -c '.patch')" >> $GITHUB_OUTPUT
          echo "detail=$(echo "$RESULT" | jq -r '.detail')" >> $GITHUB_OUTPUT
          # 摘要行
          echo "summary=$(echo "$RESULT" | jq -r '
            if .action == "delete" then "删除记录 " + .waypointId
            else
              ([
                (if .patch.name then "名称→\(.patch.name)" else empty end),
                (if .patch.x != null then "坐标→\(.patch.x) \(.patch.y) \(.patch.z)" else empty end),
                (if .patch.dimension then "维度→\(.patch.dimension)" else empty end),
                (if .patch.note != null then "备注→\(.patch.note)" else empty end)
              ] | join("；"))
            end
          ')" >> $GITHUB_OUTPUT

      - name: 校验 id 是否存在
        if: steps.gate.outputs.proceed == 'true' && steps.parse.outputs.valid == 'true'
        id: exists
        run: |
          set -euo pipefail
          ID="${{ steps.parse.outputs.waypoint_id }}"
          FOUND=$(jq -c --arg id "$ID" 'select(.id == $id)' public/data/waypoints.jsonl | head -n 1 || true)
          if [ -n "$FOUND" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "record=$FOUND" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 校验失败
        if: >
          steps.gate.outputs.proceed == 'true' &&
          ( steps.parse.outputs.valid == 'false' || steps.exists.outputs.ok == 'false' )
        run: |
          ERR_LINES=$(echo '${{ steps.parse.outputs.errors }}' | jq -r '.[]?' 2>/dev/null || true)
          if [ "${{ steps.parse.outputs.valid }}" = "true" ] && [ "${{ steps.exists.outputs.ok }}" = "false" ]; then
            ERR_LINES="${ERR_LINES}"$'\n'"❌ 数据中未找到记录 ID: \`${{ steps.parse.outputs.waypoint_id }}\`"
          fi
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "❌ **报错单校验失败，请修正后重新提交：**

          ${ERR_LINES}"
          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "ci:invalid"

      - name: 直接应用修正
        if: >
          steps.gate.outputs.proceed == 'true' &&
          steps.parse.outputs.valid == 'true' &&
          steps.exists.outputs.ok == 'true' &&
          steps.parse.outputs.is_maintainer == 'true' &&
          steps.parse.outputs.debug == 'false'
        id: apply_direct
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          PATCH='${{ steps.parse.outputs.patch }}'
          RESULT=$(node .github/scripts/ci-waypoint.mjs patch public/data/waypoints.jsonl "$PATCH")
          echo "$RESULT" > /tmp/patch-result.json
          echo "ok=$(echo "$RESULT" | jq -r '.ok')" >> $GITHUB_OUTPUT
          if [ "$(echo "$RESULT" | jq -r '.ok')" != "true" ]; then
            echo "error=$(echo "$RESULT" | jq -r '.error')" >> $GITHUB_OUTPUT
            exit 1
          fi

          cp public/data/waypoints.jsonl /tmp/waypoints.jsonl
          git fetch origin data
          git checkout data
          cp /tmp/waypoints.jsonl public/data/waypoints.jsonl
          git add public/data/waypoints.jsonl
          git commit -m "修正坐标: ${{ steps.parse.outputs.summary }}

          Closes #${{ github.event.issue.number }}"
          git push origin data
          git checkout main
          gh workflow run "构建部署" --repo "${{ github.repository }}" || true

      - name: 直接修正完成
        if: >
          steps.gate.outputs.proceed == 'true' &&
          steps.parse.outputs.valid == 'true' &&
          steps.exists.outputs.ok == 'true' &&
          steps.parse.outputs.is_maintainer == 'true' &&
          steps.parse.outputs.debug == 'false' &&
          steps.apply_direct.outputs.ok == 'true'
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "✨ **维护者提交 — 报错已直接应用**

          | 字段 | 值 |
          |------|-----|
          | 记录 ID | \`${{ steps.parse.outputs.waypoint_id }}\` |
          | 操作 | ${{ steps.parse.outputs.action }} |
          | 变更 | ${{ steps.parse.outputs.summary }} |
          | 提交者 | @${{ github.event.issue.user.login }} |"

          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}"
          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "ci:processed"

      - name: 进入审核
        if: >
          steps.gate.outputs.proceed == 'true' &&
          steps.parse.outputs.valid == 'true' &&
          steps.exists.outputs.ok == 'true' &&
          ( steps.parse.outputs.is_maintainer == 'false' || steps.parse.outputs.debug == 'true' )
        run: |
          REC='${{ steps.exists.outputs.record }}'
          NAME=$(echo "$REC" | jq -r '.name')
          COORDS=$(echo "$REC" | jq -r '"\(.x) \(.y) \(.z)"')
          DIM=$(echo "$REC" | jq -r '.dimension')
          NOTE=$(echo "$REC" | jq -r '.note // ""')

          LABELS="ci:pending"
          if [ "${{ steps.parse.outputs.debug }}" = "true" ]; then
            LABELS="ci:pending,ci:review"
          fi

          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "📝 **坐标报错待审核**

          | 字段 | 值 |
          |------|-----|
          | 记录 ID | \`${{ steps.parse.outputs.waypoint_id }}\` |
          | 当前名称 | ${NAME} |
          | 当前坐标 | ${COORDS} |
          | 当前维度 | ${DIM} |
          | 当前备注 | ${NOTE} |
          | 操作 | \`${{ steps.parse.outputs.action }}\` |
          | 变更摘要 | ${{ steps.parse.outputs.summary }} |

          **说明**：${{ steps.parse.outputs.detail }}

          > 请维护者回复 \`通过\` / \`ok\` 应用修正，或 \`不通过\` / \`fail\` 拒绝。"

          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "$LABELS"

      - name: 上报 CI 异常
        if: failure() && steps.gate.outputs.proceed == 'true'
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "[CI Bug] 报错校验 #${{ github.event.issue.number }} 时出错" \
            --body "## CI 异常

          - **触发 Issue**: #${{ github.event.issue.number }}
          - **Workflow**: ${{ github.workflow }}
          - **Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          请检查 [运行日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})。" \
            --label "bug"

  review:
    if: >
      vars.CI_DISABLED != 'true' &&
      github.event.action == 'created' &&
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'ci:report_waypoint') &&
      contains(github.event.issue.labels.*.name, 'ci:pending') &&
      !contains(github.event.issue.labels.*.name, 'ci:processed') &&
      !contains(github.event.issue.labels.*.name, 'ci:approved') &&
      !contains(github.event.issue.labels.*.name, 'ci:rejected') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'MEMBER'
      )
    permissions:
      contents: write
      issues: write
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: 幂等门闩
        id: gate
        run: |
          set -euo pipefail
          LABELS=$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name] | join(",")')
          echo "live_labels=$LABELS"
          if echo ",$LABELS," | grep -qE ',(ci:processed|ci:approved|ci:rejected),'; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          elif ! echo ",$LABELS," | grep -q ',ci:pending,'; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          elif ! echo ",$LABELS," | grep -q ',ci:report_waypoint,'; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 判断审核结果
        if: steps.gate.outputs.proceed == 'true'
        id: review
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          LOWER=$(echo "$COMMENT" | tr '[:upper:]' '[:lower:]' | tr -d '\r')
          if echo "$LOWER" | grep -qE '不通过|fail|拒绝|reject|(^|[[:space:]])no($|[[:space:]])'; then
            echo "result=rejected" >> $GITHUB_OUTPUT
          elif echo "$LOWER" | grep -qE '通过|(^|[[:space:]])ok($|[[:space:]])|approve'; then
            echo "result=approved" >> $GITHUB_OUTPUT
          else
            echo "result=ignored" >> $GITHUB_OUTPUT
          fi

      - name: 审核拒绝
        if: steps.gate.outputs.proceed == 'true' && steps.review.outputs.result == 'rejected'
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "🚫 **报错审核未通过**

          审核人: @${{ github.event.comment.user.login }}

          请根据反馈修正后重新提交。"
          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "ci:rejected"

      - uses: actions/checkout@v4
        if: steps.gate.outputs.proceed == 'true' && steps.review.outputs.result == 'approved'

      - name: 获取数据并应用
        if: steps.gate.outputs.proceed == 'true' && steps.review.outputs.result == 'approved'
        id: apply
        env:
          BODY: ${{ github.event.issue.body }}
          AUTHOR_ASSOC: ${{ github.event.issue.author_association }}
        run: |
          set -euo pipefail
          git fetch origin data
          git show origin/data:public/data/waypoints.jsonl > public/data/waypoints.jsonl 2>/dev/null || touch public/data/waypoints.jsonl

          RESULT=$(node .github/scripts/ci-waypoint.mjs parse-report)
          echo "summary=$(echo "$RESULT" | jq -r '
            if .action == "delete" then "删除记录 " + .waypointId
            else
              ([
                (if .patch.name then "名称→\(.patch.name)" else empty end),
                (if .patch.x != null then "坐标→\(.patch.x) \(.patch.y) \(.patch.z)" else empty end),
                (if .patch.dimension then "维度→\(.patch.dimension)" else empty end),
                (if .patch.note != null then "备注→\(.patch.note)" else empty end)
              ] | join("；"))
            end
          ')" >> $GITHUB_OUTPUT
          echo "action=$(echo "$RESULT" | jq -r '.action')" >> $GITHUB_OUTPUT
          echo "waypoint_id=$(echo "$RESULT" | jq -r '.waypointId')" >> $GITHUB_OUTPUT

          PATCH=$(echo "$RESULT" | jq -c '.patch')
          APPLIED=$(node .github/scripts/ci-waypoint.mjs patch public/data/waypoints.jsonl "$PATCH")
          echo "$APPLIED" > /tmp/patch-result.json
          if [ "$(echo "$APPLIED" | jq -r '.ok')" != "true" ]; then
            echo "patch failed: $APPLIED"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp public/data/waypoints.jsonl /tmp/waypoints.jsonl
          git fetch origin data
          git checkout data
          cp /tmp/waypoints.jsonl public/data/waypoints.jsonl
          git add public/data/waypoints.jsonl
          git commit -m "修正坐标: $(echo "$RESULT" | jq -r '
            if .action == "delete" then "删除 " + .waypointId
            else ([
              (if .patch.name then "名称→\(.patch.name)" else empty end),
              (if .patch.x != null then "坐标→\(.patch.x) \(.patch.y) \(.patch.z)" else empty end),
              (if .patch.dimension then "维度→\(.patch.dimension)" else empty end),
              (if .patch.note != null then "备注" else empty end)
            ] | join("；"))
            end
          ')

          Closes #${{ github.event.issue.number }}"
          git push origin data
          git checkout main
          gh workflow run "构建部署" --repo "${{ github.repository }}" || true

      - name: 评论并关闭
        if: steps.gate.outputs.proceed == 'true' && steps.review.outputs.result == 'approved'
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" -b "✨ **报错审核通过，已写入 data 分支**

          | 字段 | 值 |
          |------|-----|
          | 记录 ID | \`${{ steps.apply.outputs.waypoint_id }}\` |
          | 操作 | ${{ steps.apply.outputs.action }} |
          | 变更 | ${{ steps.apply.outputs.summary }} |

          审核人: @${{ github.event.comment.user.login }}"

          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}"
          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "ci:approved,ci:processed"

      - name: 上报 CI 异常
        if: failure() && steps.gate.outputs.proceed == 'true'
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "[CI Bug] 报错审核 #${{ github.event.issue.number }} 时出错" \
            --body "## CI 异常

          - **触发 Issue**: #${{ github.event.issue.number }}
          - **Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          请检查运行日志。" \
            --label "bug"
