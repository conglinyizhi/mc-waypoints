name: 坐标报错 / 纠错
description: 报告错误坐标并建议修正（网页表单会自动预填）
title: "[报错] "
labels: ["ci:report_waypoint"]
body:
  - type: markdown
    attributes:
      value: |
        > 从网页「操作 → 报错」打开时会自动填入记录信息。
        > 维护者审核通过后回复 `通过` / `ok`，CI 会按下方字段自动改 data 分支。

  - type: input
    id: waypoint_id
    attributes:
      label: 记录 ID
      description: 坐标点 id（网页自动填入，必填）
      placeholder: ci-1784112896-8
    validations:
      required: true

  - type: input
    id: current_name
    attributes:
      label: 当前名称
      description: 仅供对照（网页自动填入）
      placeholder: 我家
    validations:
      required: false

  - type: input
    id: current_coords
    attributes:
      label: 当前坐标
      description: "当前 X Y Z（网页自动填入）"
      placeholder: "-512 64 1024"
    validations:
      required: false

  - type: input
    id: current_dimension
    attributes:
      label: 当前维度
      description: overworld / nether / end
      placeholder: overworld
    validations:
      required: false

  - type: input
    id: current_note
    attributes:
      label: 当前备注
      description: 网页自动填入
    validations:
      required: false

  - type: dropdown
    id: action
    attributes:
      label: 操作类型
      description: update=按下方新字段修正；delete=删除整条记录
      options:
        - update
        - delete
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### 修正内容
        操作类型为 `update` 时：下面各「新*」字段**有填写则覆盖**，留空（`_No response_`）表示不改该项。

  - type: input
    id: new_name
    attributes:
      label: 新名称
      description: 留空表示不修改名称
      placeholder: 正确名称

  - type: input
    id: new_coords
    attributes:
      label: 新坐标
      description: "留空表示不修改。格式：X Y Z 或 X,Y,Z"
      placeholder: "100 64 -200"

  - type: input
    id: new_dimension
    attributes:
      label: 新维度
      description: 留空表示不修改。overworld / nether / end（或主世界、下界/地狱、末地）
      placeholder: nether

  - type: input
    id: new_note
    attributes:
      label: 新备注
      description: 留空表示不修改；填写 `-` 可清空备注
      placeholder: 补充说明

  - type: textarea
    id: detail
    attributes:
      label: 问题说明
      description: 错在哪、为何要改（审核参考）
      placeholder: 实际坐标偏了约 30 格，正确应为 …
    validations:
      required: true

  - type: checkboxes
    id: debug
    attributes:
      label: 调试选项（仅维护者）
      description: 勾选后即使是维护者也走完整审核，不直接写入
      options:
        - label: ci:review
